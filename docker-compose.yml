services:
  api:
    build:
      context: ./backend
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      VSTOCK_DB_PATH: /data/vstock.db
      PORT: "8000"
    volumes:
      - vstock-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  vstock-data:
