# Quote provider failover chain (Phase 1).
# Lower priority number = tried first.

quotes:
  strategy: failover
  interval_seconds: 15

  providers:
    - name: vps
      priority: 1
      type: realtime
      batch: true

    - name: ssi_iboard
      priority: 2
      type: realtime
      batch: false

    - name: entrade_stale
      priority: 3
      type: stale
      batch: true
      max_age_minutes: 1440

    - name: kbs_stale
      priority: 4
      type: stale
      batch: false
      max_age_minutes: 1440

news:
  strategy: merge
  ttl_seconds: 900

  providers:
    - name: vndirect
      priority: 1
      groups:
        - stock_news
        - macro_news
        - company_news
        - disclosure
        - commodity_news
        - real_estate_news

    - name: vnexpress_rss
      priority: 2
      url: https://vnexpress.net/rss/kinh-doanh.rss
      source: VnExpress
      category: stock_news

    - name: thanhnien_rss
      priority: 3
      url: https://thanhnien.vn/rss/kinh-te.rss
      source: Thanh Niên
      category: macro_news

# Background ingestion (Phase 2).
ingestion:
  quote_symbols:
    - VNM
    - FPT
    - VIC
    - HPG
    - MWG
    - VCB
    - TCB
    - MBB
    - GAS
    - MSN
  quote_interval_open_seconds: 15
  quote_interval_closed_seconds: 300
  skip_when_market_closed: true
  news_interval_seconds: 900
  news_market_limit: 50
  news_max_rows: 1000
