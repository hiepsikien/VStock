# Fly.io — persistent SQLite volume + always-on scheduler
# Docs: docs/DEPLOY.md

app = "vstock-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  VSTOCK_DB_PATH = "/data/vstock.db"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "vstock_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
